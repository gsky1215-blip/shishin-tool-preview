<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四神組織診断 V4 ── 文言検証プレビュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Old+Mincho:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1614;--paper:#faf9f7;--accent:#2a5298;--accent2:#c8922a;
  --muted:#7a7470;--line:#e0dbd4;--fv-bg-start:#f7f6f4;--fv-bg-end:#eceaf0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);line-height:1.8;overflow-x:hidden;}

/* ══ V4 検証コントロール ══ */
#v4-bar{position:sticky;top:0;z-index:50;background:#1a1614;color:#fff;padding:10px 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.25);}
#v4-bar .v4-title{font-family:'Zen Old Mincho',serif;font-weight:900;letter-spacing:.1em;font-size:14px;color:#f0c060;margin-right:4px;}
#v4-bar label{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.08em;margin-right:2px;}
#v4-bar select{font-family:inherit;font-size:14px;font-weight:700;padding:7px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:#2a2520;color:#fff;cursor:pointer;}
#v4-bar .v4-x{color:rgba(255,255,255,.4);font-weight:700;}
#v4-bar .v4-note{font-size:10.5px;color:rgba(255,255,255,.45);width:100%;line-height:1.6;}
#v4-bar .v4-quizbtn{margin-left:auto;font-size:12px;font-weight:700;padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;cursor:pointer;}
#v4-bar .v4-quizbtn:hover{background:rgba(255,255,255,.1);}

/* ドラフトバッジ */
#draft-badge{position:fixed;right:10px;bottom:12px;z-index:60;background:#c8432a;color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:6px 12px;border-radius:100px;box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;}

/* ══ 16問クイズ（折りたたみ）══ */
#quiz-wrap{max-width:600px;margin:0 auto;padding:0 20px;overflow:hidden;max-height:0;transition:max-height .4s ease;}
#quiz-wrap.open{max-height:none;padding:20px;}
.q-block{border-bottom:1px solid #ece8e2;padding:16px 0;}
.q-num{font-size:11px;letter-spacing:.15em;color:#9aaac8;font-weight:600;margin-bottom:8px;display:block;}
.q-text{font-size:15px;color:#1a1e2e;line-height:1.7;margin-bottom:14px;font-weight:700;}
.circles-wrap{display:flex;align-items:center;gap:10px;}
.cw-lbl{font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.cw-lbl.l{color:#2a7a5a;}.cw-lbl.r{color:#6a4a8a;}
.circles-inner{display:flex;align-items:center;gap:14px;flex:1;justify-content:center;}
.circle{border-radius:50%;background:#fff;cursor:pointer;border:2px solid #b0b0c0;transition:all .12s;}
.sz-lg{width:38px;height:38px;border-color:#2a7a5a;}
.sz-md{width:32px;height:32px;border-color:#6a9a80;}
.sz-sm{width:26px;height:26px;border-color:#a0a0b4;}
.circle[data-pos="3"]{border-color:#9a7ab0;}
.circle[data-pos="4"]{border-color:#6a4a8a;}
.circle.sel{position:relative;}
.circle.sel::after{content:'✓';color:#fff;font-weight:700;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.circle[data-pos="0"].sel{background:#2a7a5a;border-color:#2a7a5a;}
.circle[data-pos="1"].sel{background:#6a9a80;border-color:#6a9a80;}
.circle[data-pos="2"].sel{background:#9a9aaa;border-color:#9a9aaa;}
.circle[data-pos="3"].sel{background:#9a7ab0;border-color:#9a7ab0;}
.circle[data-pos="4"].sel{background:#6a4a8a;border-color:#6a4a8a;}
#quiz-actions{display:flex;gap:12px;margin:24px 0 8px;}
#quiz-submit{flex:1;padding:15px;background:var(--accent);color:#fff;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:15px;}
#quiz-random{padding:15px 18px;background:#fff;color:var(--muted);border:1px solid var(--line);border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;}
#quiz-err{color:#c0392b;font-size:13px;margin-top:8px;display:none;}

/* ══ 結果画面（mock流用）══ */
.site-header{background:#fff;border-bottom:1px solid var(--line);color:var(--ink);padding:14px 20px;display:flex;align-items:center;gap:12px;font-size:13px;letter-spacing:.12em;}
.site-header .brand{font-family:'Zen Old Mincho',serif;font-size:17px;font-weight:700;letter-spacing:.2em;color:var(--accent);}
.fv{min-height:auto;display:flex;flex-direction:column;background:linear-gradient(160deg,#f7f6f4 0%,#eeeaf4 55%,#e8e4f0 100%);position:relative;overflow:hidden;padding-top:36px;}
.fv::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 60% at 65% 45%,rgba(42,82,152,.07) 0%,transparent 65%);pointer-events:none;}
.fv-text{display:flex;flex-direction:column;align-items:flex-start;padding:8px 24px 48px;position:relative;z-index:1;max-width:680px;margin:0 auto;width:100%;}
.fv-label{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.25em;color:var(--accent2);text-transform:uppercase;margin-bottom:20px;font-weight:700;}
.fv-label::before{content:'';display:block;width:24px;height:1px;background:var(--accent2);}
.fv-type-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(42,82,152,.08);border:1px solid rgba(42,82,152,.2);border-radius:4px;padding:6px 16px;color:var(--accent);font-size:13px;letter-spacing:.1em;margin-bottom:18px;width:fit-content;font-weight:600;}
.fv-title{font-family:'Zen Old Mincho',serif;font-size:clamp(38px,12vw,58px);color:var(--ink);line-height:1.2;font-weight:900;margin-bottom:8px;letter-spacing:.1em;}
.fv-title .accent-char{color:var(--accent);}
.fv-subtitle{font-size:14px;color:var(--muted);letter-spacing:.12em;margin-bottom:26px;}
.fv-keywords{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:30px;}
.kw-tag{background:rgba(42,82,152,.07);border:1px solid rgba(42,82,152,.18);color:var(--accent);padding:5px 16px;border-radius:100px;font-size:13px;letter-spacing:.1em;font-weight:600;}
.kw-tag.highlight{background:var(--accent);border-color:var(--accent);color:#fff;}
.fv-desc{color:#4a4540;font-size:15px;line-height:1.9;max-width:420px;border-left:3px solid var(--accent);padding-left:20px;}
.scroll-hint{text-align:center;padding:20px;background:var(--paper);color:var(--muted);font-size:12px;letter-spacing:.2em;}
.section{padding:20px 0;background:#f0ede8;}
.section-inner{max-width:600px;margin:0 auto;padding:0 20px;}
.content-card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:16px;}
.card-header{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid var(--line);background:#faf9f7;}
.card-header-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;font-family:'Zen Old Mincho',serif;}
.card-header-title{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:.03em;}
.card-header-title strong{color:var(--accent);}
.card-body{padding:24px 22px;}
.comp-label{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:14px;}
.comp-legend{display:flex;flex-direction:column;gap:9px;}
.comp-item{display:flex;align-items:center;gap:12px;}
.comp-item-left{display:flex;align-items:center;gap:6px;width:52px;flex-shrink:0;}
.comp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.comp-name{font-size:13px;font-weight:700;color:var(--ink);}
.comp-name.primary{color:var(--accent);}
.comp-bar-track{flex:1;height:12px;background:rgba(0,0,0,.07);border-radius:100px;overflow:hidden;}
.comp-bar-fill{height:100%;border-radius:100px;transition:width .6s ease;}
.comp-pct-num{font-size:15px;font-weight:900;font-family:'Zen Old Mincho',serif;width:38px;text-align:right;flex-shrink:0;}
.traits-lead{font-size:16px;line-height:2;color:var(--ink);margin-bottom:20px;}
.bullet-row{display:flex;gap:12px;align-items:flex-start;font-size:14px;color:var(--ink);line-height:1.7;margin-bottom:10px;}
.bullet-row .mk{color:var(--accent);font-weight:700;flex-shrink:0;}
.actions-grid{display:flex;flex-direction:column;gap:16px;}
.action-item{display:flex;gap:16px;align-items:flex-start;}
.action-num{font-family:'Zen Old Mincho',serif;font-size:28px;font-weight:900;color:var(--accent);opacity:.3;line-height:1;flex-shrink:0;width:32px;}
.action-text{display:flex;flex-direction:column;gap:2px;}
.action-text strong{font-size:15px;color:var(--ink);}
.action-text span{font-size:13px;color:var(--muted);}
.sw-grid{display:grid;grid-template-columns:1fr;gap:14px;}
.sw-card{border-radius:12px;padding:18px;}
.sw-card.strength{background:#f0f4fb;border:1px solid rgba(42,82,152,.15);}
.sw-card.weakness{background:#fdf5f0;border:1px solid rgba(192,80,48,.12);}
.sw-card-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;line-height:1.5;}
.sw-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
.sw-list li{font-size:13px;color:var(--muted);padding-left:12px;position:relative;line-height:1.6;}
.sw-list li::before{content:'·';position:absolute;left:0;color:var(--accent);}
.sw-bridge{text-align:center;padding:26px 6px 22px;font-family:'Zen Old Mincho',serif;font-size:clamp(15px,4.4vw,17px);font-weight:700;color:var(--ink);line-height:1.9;text-wrap:balance;}
.sw-bridge-label{font-size:13px;letter-spacing:.1em;color:#a8543a;font-weight:700;margin-bottom:12px;}
.plain-center{max-width:600px;}
.wall-q{font-family:'Zen Old Mincho',serif;font-size:17px;font-weight:700;color:var(--ink);text-align:center;line-height:1.9;margin:0 0 36px;}
.wall-line{font-size:16px;color:var(--ink);line-height:2.1;text-align:center;margin-bottom:22px;}
.wall-punch{font-family:'Zen Old Mincho',serif;font-size:clamp(20px,6vw,26px);font-weight:900;color:var(--ink);text-align:center;line-height:1.6;margin:0;text-wrap:balance;}
.navy{background:var(--accent);padding:44px 0;}
.navy .section-inner{text-align:center;}
.navy h3{font-family:'Zen Old Mincho',serif;font-size:clamp(19px,5.6vw,24px);font-weight:900;color:#fff;line-height:1.7;margin-bottom:16px;}
.navy p{font-size:15px;color:rgba(255,255,255,.82);line-height:2;}
.navy .gold{color:#f0c060;}
.navy-box{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:18px 26px;display:inline-block;margin-top:20px;}
.navy-box .lb{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.15em;margin-bottom:8px;}
.navy-box .vl{font-size:18px;font-weight:900;color:#fff;letter-spacing:.05em;}
.shadow-card .card-header{background:#1a1614;}
.shadow-card .card-header-icon{background:rgba(255,255,255,.15);}
.shadow-card .card-header-title{color:#fff;}
.shadow-card .card-header-title strong{color:#f0c060;}
.shadow-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.08em;}
.shadow-symp{background:#faf8f4;border:1px solid #ece6dc;border-radius:10px;padding:18px 20px;margin:20px 0;display:flex;flex-direction:column;gap:12px;}
.shadow-symp .sy{font-size:15px;font-weight:700;color:var(--ink);display:flex;gap:10px;align-items:flex-start;line-height:1.7;}
.shadow-symp .sy .mk{color:#c8922a;flex-shrink:0;}
.shadow-qualities{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0;}
.sq-tag{background:#f5f2ec;border:1px solid var(--line);padding:8px 16px;border-radius:6px;font-size:13.5px;font-weight:700;color:var(--ink);}
.shadow-growth{font-size:15px;line-height:2;color:var(--ink);margin-top:24px;padding-top:20px;border-top:1px solid var(--line);font-weight:700;}
.section-cta{background:var(--paper);padding:40px 0;text-align:center;}
.btn-primary{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#fff;padding:16px 34px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;letter-spacing:.05em;text-decoration:none;line-height:1.5;}
.btn-line{background:#06C755;}
.reg-list{margin-top:22px;display:flex;flex-direction:column;gap:6px;align-items:center;font-size:13px;color:var(--muted);line-height:1.8;}
.teaser-box{background:#faf9f7;border:1px solid var(--line);border-radius:12px;padding:18px 22px;display:flex;flex-direction:column;gap:14px;margin:18px 0;}
.teaser-box .ti{display:flex;gap:12px;font-size:15px;color:var(--ink);line-height:1.75;}
.teaser-box .ti .mk{color:var(--accent);font-weight:700;flex-shrink:0;}

/* ══ LINE 区切り ══ */
.line-gate{background:#0c0a09;color:#06C755;text-align:center;padding:30px 24px;font-size:13px;letter-spacing:.06em;line-height:1.9;border-top:2px dashed #06C755;border-bottom:2px dashed #06C755;}
.line-gate .lg-mark{font-size:11px;color:rgba(255,255,255,.4);display:block;margin-top:8px;letter-spacing:.1em;}

/* ══ Part2 ══ */
.p2-inner{max-width:560px;margin:0 auto;padding:0 20px;}
.p2-sec{padding:48px 0;}
.p2-sec.alt{background:#f0ede8;}
.p2-kicker{text-align:center;font-size:11px;letter-spacing:.22em;color:var(--muted);font-weight:700;margin-bottom:14px;}
.p2-kicker.case{font-size:14px;letter-spacing:.1em;color:var(--accent);margin-bottom:16px;}
.p2-kicker.case::before{content:'';display:block;width:34px;height:2px;background:var(--accent);margin:0 auto 12px;}
.p2-h2{font-family:'Zen Old Mincho',serif;font-size:clamp(21px,5.6vw,27px);font-weight:900;color:var(--ink);line-height:1.6;text-align:center;margin-bottom:22px;letter-spacing:.02em;text-wrap:balance;}
.p2-p{font-size:15px;line-height:2;color:var(--ink);margin-bottom:16px;}
.p2-p.center{text-align:center;}
.p2-p.mut{color:var(--muted);}
.p2-lines{display:flex;flex-direction:column;gap:6px;margin:0 0 18px;}
.p2-lines .ln{background:#efece7;border-radius:8px;padding:11px 16px;font-size:15px;font-weight:700;color:var(--ink);text-align:center;letter-spacing:.04em;}
.p2-check{display:flex;flex-direction:column;gap:8px;margin:0 0 20px;}
.p2-check .ck{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 16px;font-size:14px;line-height:1.75;color:var(--ink);}
.p2-check.ask .ck::before{content:'？';color:var(--accent);font-weight:700;font-size:13px;flex-shrink:0;}
.p2-bridge{text-align:center;font-family:'Zen Old Mincho',serif;font-size:15px;color:var(--ink);line-height:1.95;margin:22px 0 0;text-wrap:balance;}
.p2-close{font-family:'Zen Old Mincho',serif;font-size:clamp(16px,4.6vw,19px);font-weight:700;color:var(--ink);line-height:2;text-align:center;padding:22px 10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin:8px 0;text-wrap:balance;}
.p2-close em{font-style:normal;color:var(--accent);}
.ba-card{border-radius:14px;overflow:hidden;border:1px solid var(--line);margin-bottom:16px;background:#fff;}
.ba-head{padding:13px 18px;font-size:13px;font-weight:700;letter-spacing:.08em;display:flex;align-items:center;gap:10px;}
.ba-card.before .ba-head{background:#6a6460;color:#fff;}
.ba-card.after .ba-head{background:var(--accent);color:#fff;}
.ba-tag{font-size:10px;letter-spacing:.16em;border:1px solid rgba(255,255,255,.5);border-radius:100px;padding:2px 10px;}
.ba-body{padding:16px 14px;}
.ba-list{display:flex;flex-direction:column;gap:7px;}
.ba-list .it{display:flex;gap:9px;align-items:flex-start;font-size:15px;line-height:1.8;color:var(--ink);}
.ba-card.before .it::before{content:'▸';color:#8a8480;flex-shrink:0;}
.ba-card.after .it::before{content:'▸';color:var(--accent);flex-shrink:0;}
.rank-card{border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:12px;overflow:hidden;}
.rank-card:last-child{margin-bottom:0;}
.rank-head{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);background:#faf9f7;}
.rank-badge{font-family:'Zen Old Mincho',serif;font-size:18px;font-weight:900;color:#fff;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rank-A .rank-badge{background:var(--accent);}
.rank-B .rank-badge{background:#c8922a;}
.rank-C .rank-badge{background:#8a8480;}
.rank-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.5;}
.rank-body{padding:14px 16px;display:flex;flex-direction:column;gap:7px;}
.rank-body .it{display:flex;gap:9px;align-items:flex-start;font-size:14.5px;line-height:1.75;color:var(--ink);}
.rank-body .it::before{content:'・';color:var(--accent);flex-shrink:0;}
.p2-vs{background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px 20px;text-align:center;margin-bottom:20px;}
.p2-vs .no{font-size:14px;color:var(--muted);line-height:1.8;}
.p2-vs .yes{font-family:'Zen Old Mincho',serif;font-size:17px;font-weight:900;color:var(--accent);line-height:1.8;margin-top:8px;}
.p2-trade{display:flex;flex-direction:column;gap:18px;margin-bottom:26px;}
.p2-trade .tr{background:#f3f0ea;border-left:4px solid var(--accent);border-radius:0 10px 10px 0;padding:18px 20px;font-size:16px;line-height:1.6;color:var(--ink);}
.p2-trade .tr span{color:var(--accent);font-weight:700;}
.p2-band{background:var(--accent);padding:52px 0;margin-top:14px;}
.p2-band .p2-inner{text-align:center;}
.p2-band .big{font-family:'Zen Old Mincho',serif;font-size:clamp(20px,5.8vw,27px);font-weight:900;color:#fff;line-height:1.9;margin-bottom:26px;text-wrap:balance;}
.p2-band .big em{font-style:normal;color:#f0c060;}
.p2-brand{font-family:'Zen Old Mincho',serif;font-size:clamp(26px,8vw,38px);font-weight:900;color:#fff;letter-spacing:.06em;line-height:1.6;margin-bottom:24px;}
.p2-def{display:inline-block;background:rgba(255,255,255,.1);border:1px solid rgba(240,192,96,.4);border-radius:12px;padding:18px 26px;font-family:'Zen Old Mincho',serif;font-size:clamp(15px,4.4vw,18px);font-weight:700;color:#fff;line-height:2;}
.god-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;}
.god{border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;border:1px solid var(--line);background:#fff;}
.god .nm{font-family:'Zen Old Mincho',serif;font-size:17px;font-weight:900;flex-shrink:0;width:44px;}
.god .ds{font-size:15px;color:var(--ink);line-height:1.7;}
.god.seiryu .nm{color:#2a5298;}.god.suzaku .nm{color:#e05c2a;}.god.byakko .nm{color:#c8922a;}.god.genbu .nm{color:#2a7a4a;}
.res-pair{display:flex;gap:10px;margin-bottom:18px;}
.res-box{flex:1;border-radius:12px;padding:16px 12px;text-align:center;border:1px solid var(--line);background:#fff;}
.res-box .lab{font-size:11px;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:6px;}
.res-box .god-name{font-family:'Zen Old Mincho',serif;font-size:24px;font-weight:900;letter-spacing:.1em;}
.res-box.riki{background:var(--accent);border-color:var(--accent);}
.res-box.riki .lab{color:rgba(255,255,255,.72);}
.res-box.riki .god-name{color:#fff;}
.res-box.kage{background:#1a1614;border-color:#1a1614;}
.res-box.kage .lab{color:rgba(255,255,255,.55);}
.res-box.kage .god-name{color:#f0c060;}
.mini-comp{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 16px 11px;margin-bottom:18px;}
.mini-comp .comp-label{margin-bottom:8px;}
.mini-comp .comp-legend{gap:7px;}
.p2-cta{background:linear-gradient(160deg,#f7f6f4 0%,#eeeaf4 60%,#e8e4f0 100%);padding:52px 0 60px;text-align:center;}

// 定数
// ═══════════════════════════════════════════════════
const GOD_ORDER = ['seiryu','suzaku','byakko','genbu'];
const GOD_COLOR = {seiryu:'#2a5298', suzaku:'#e05c2a', byakko:'#c8922a', genbu:'#2a7a4a'};

// ═══════════════════════════════════════════════════
// パースヘルパー
// ═══════════════════════════════════════════════════
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// keywords: "創造・直感・スピード・拡張（強調：創造）"
function parseKeywords(str){
  let hl=null;
  const m=str.match(/（強調：(.+?)）/);
  if(m){hl=m[1];str=str.replace(m[0],'');}
  const arr=str.split(/[・／]/).map(s=>s.trim()).filter(Boolean);
  return {tags:arr, highlight:hl};
}
// title + ・bullets ブロック（strength/weakness/r2_bacard）
function parseTitleBullets(str){
  const lines=str.split('\n').map(s=>s.trim()).filter(Boolean);
  const title=lines[0];
  const bullets=lines.slice(1).map(l=>l.replace(/^・/,'').trim());
  return {title, bullets};
}
// actions: 各行 "NN 見出し｜補足"
function parseActions(str){
  return str.split('\n').map(s=>s.trim()).filter(Boolean).map(line=>{
    const numMatch=line.match(/^(\d{1,2})\s*(.*)$/);
    const num=numMatch?numMatch[1]:'';
    const rest=numMatch?numMatch[2]:line;
    const parts=rest.split('｜');
    return {num, strong:parts[0].trim(), sub:(parts[1]||'').trim()};
  });
}
// shadow_symptoms: "▸..." 3行
function parseSymptoms(str){
  return str.split('\n').map(s=>s.trim()).filter(Boolean).map(l=>l.replace(/^▸/,'').trim());
}
// 単純な ・ / ／ 区切りリスト
function splitList(str){ return str.split(/[・／\n]/).map(s=>s.trim()).filter(Boolean); }

// CASE パース: \n区切りのセグメント。【ラベル】本文 or 素の行
function parseCase(str){
  const segs=str.split('\n').map(s=>s.trim()).filter(Boolean);
  const out=[];
  for(const seg of segs){
    const m=seg.match(/^【(.+?)】([\s\S]*)$/);
    if(!m){ out.push({type:'note', text:seg}); continue; }
    const label=m[1].trim(); const body=m[2].trim();
    if(label==='見出し'){ out.push({type:'h', text:body}); }
    else if(label==='締め'){ out.push({type:'close', lines:body.split('／').map(s=>s.trim()).filter(Boolean)}); }
    else if(label==='橋渡し'){ out.push({type:'bridge', text:body}); }
    else if(/^BEFORE/.test(label)){ out.push({type:'before', head:label.replace(/^BEFORE\s*/,''), items:body.split('／').map(s=>s.trim()).filter(Boolean)}); }
    else if(/^AFTER/.test(label)){ out.push(parseAfter(label.replace(/^AFTER\s*/,''), body)); }
    else if(/^＋/.test(label)){ out.push(parseAfter(label, body)); } // ＋玄武 等
    else { out.push({type:'note', text:body}); }
  }
  return out;
}
function parseAfter(head, body){
  // A/B/Cランク構造か判定
  if(/｜\s*B\s/.test(body) || /^A\s/.test(body)){
    const parts=body.split('｜').map(s=>s.trim()).filter(Boolean);
    const ranks=parts.map(p=>{
      const letter=p[0];
      const rest=p.slice(1).trim();
      const ci=rest.indexOf('：');
      const title=ci>=0?rest.slice(0,ci).trim():rest;
      const itemsStr=ci>=0?rest.slice(ci+1):'';
      const items=itemsStr.split('／').map(s=>s.trim()).filter(Boolean);
      return {letter, title, items};
    });
    return {type:'after-rank', head, ranks};
  }
  return {type:'after', head, items:body.split('／').map(s=>s.trim()).filter(Boolean)};
}

// ═══════════════════════════════════════════════════
// 構成比（sample_pct）→ 降順アイテム
// ═══════════════════════════════════════════════════
function compItems(pct){
  return GOD_ORDER.map(g=>({g, name:DATA.gods[g], color:GOD_COLOR[g], v:pct[g]}))
    .sort((a,b)=>b.v-a.v);
}
function compLegendHTML(pct, primaryGod){
  return compItems(pct).map(it=>`
    <div class="comp-item">
      <div class="comp-item-left"><div class="comp-dot" style="background:${it.color};"></div><div class="comp-name${it.g===primaryGod?' primary':''}" style="${it.g===primaryGod?'color:'+it.color+';':''}">${it.name}</div></div>
      <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${it.v}%;background:${it.color};"></div></div>
      <div class="comp-pct-num" style="color:${it.color};">${it.v}%</div>
    </div>`).join('');
}

const QUESTIONS = [

  {id:'Q9', god:'seiryu', text:'新しい方法やトレンドが、実際の業務に取り入れられることが多い'},

  {id:'Q11',god:'byakko', text:'入社後、メンバーには高い水準が求められ、それに向けた指導が行われている'},
  {id:'Q12',god:'genbu',  text:'新しい施策を増やすよりも、既存の仕組みの改善・最適化にリソースが割かれている'},
  {id:'Q13',god:'seiryu', text:'業界初の取り組みや、誰もやっていないアイデアが社内で実際に検討のテーブルに上がりやすい'},
  {id:'Q14',god:'suzaku', text:'効率や収益性が多少落ちる場合でも、人が気持ちよく働ける状態を優先して、環境や役割が調整されている'},
  {id:'Q15',god:'byakko', text:'短期的な面白さに流されず、長期的に成果につながる選択が優先されている'},
  {id:'Q16',god:'genbu',  text:'個人の頑張りに頼るよりも、仕組みで成果が出る状態をつくることが優先されている'}
];
const VALUES=[2,1,0,-1,-2];
const SIZES=['sz-lg','sz-md','sz-sm','sz-md','sz-lg'];
const _ans={};

function diagnose(ans){
  const gods=['seiryu','suzaku','byakko','genbu'];
  const qmap={seiryu:['Q1','Q5','Q9','Q13'],suzaku:['Q2','Q6','Q10','Q14'],byakko:['Q3','Q7','Q11','Q15'],genbu:['Q4','Q8','Q12','Q16']};
  const coreQ={seiryu:'Q1',suzaku:'Q14',byakko:'Q7',genbu:'Q16'};
  const qOrder={'Q1':0,'Q7':1,'Q14':2,'Q16':3};
  const sc={}; gods.forEach(g=>{sc[g]=qmap[g].reduce((s,q)=>s+(typeof ans[q]==='number'?ans[q]:0),0);});
  const wsc={}; gods.forEach(g=>{wsc[g]=qmap[g].reduce((s,q)=>{const v=typeof ans[q]==='number'?ans[q]:0;return s+(q===coreQ[g]?v*1.5:v);},0);});
  function breakTie(tied, forRiki){
    if(!tied||tied.length===0) return gods[0];
    if(tied.length===1) return tied[0];
    const wVals=tied.map(g=>wsc[g]); const wT=forRiki?Math.max(...wVals):Math.min(...wVals);
    tied=tied.filter(g=>wsc[g]===wT); if(tied.length===1) return tied[0];
    const cVals=tied.map(g=>(typeof ans[coreQ[g]]==='number'?ans[coreQ[g]]:0)); const cT=forRiki?Math.max(...cVals):Math.min(...cVals);
    tied=tied.filter(g=>(typeof ans[coreQ[g]]==='number'?ans[coreQ[g]]:0)===cT); if(tied.length===1) return tied[0];
    const getVal=(g)=>{const vals=qmap[g].map(q=>typeof ans[q]==='number'?ans[q]:0);return forRiki?Math.max(...vals):Math.min(...vals);};
    const gT=forRiki?Math.max(...tied.map(getVal)):Math.min(...tied.map(getVal));
    tied=tied.filter(g=>getVal(g)===gT); if(tied.length===1) return tied[0];
    const getCnt=(g)=>qmap[g].filter(q=>{const v=typeof ans[q]==='number'?ans[q]:0;return forRiki?v>=1:v<=-1;}).length;
    const nT=Math.max(...tied.map(getCnt));
    tied=tied.filter(g=>getCnt(g)===nT); if(tied.length===1) return tied[0];
    return tied.sort((a,b)=>qOrder[coreQ[a]]-qOrder[coreQ[b]])[0];
  }
  const maxSc=Math.max(...gods.map(g=>sc[g]));
  const rikijin=breakTie(gods.filter(g=>sc[g]===maxSc),true);
  const others=gods.filter(g=>g!==rikijin);
  const minSc=Math.min(...others.map(g=>sc[g]));
  const kagesin=breakTie(others.filter(g=>sc[g]===minSc),false);
  return {rikijin, kagesin};
}

  document.getElementById('toggle-quiz').textContent = w.classList.contains('open') ? '16問モード ▴' : '16問モード ▾';
});
document.getElementById('quiz-random').addEventListener('click',()=>{
  QUESTIONS.forEach(q=>{
    const v=VALUES[Math.floor(Math.random()*VALUES.length)];
    _ans[q.id]=v;
    const el=document.querySelector('.circle[data-q="'+q.id+'"][data-val="'+v+'"]');
    document.querySelectorAll('.circle[data-q="'+q.id+'"]').forEach(x=>x.classList.remove('sel'));
    if(el) el.classList.add('sel');
  });
});
document.getElementById('quiz-submit').addEventListener('click',()=>{
  const missing=QUESTIONS.filter(q=>typeof _ans[q.id]!=='number');
  const err=document.getElementById('quiz-err');
  if(missing.length){ err.style.display='block'; return; }
  err.style.display='none';
  const {rikijin, kagesin}=diagnose(_ans);
  fillSelect(selKi, null, rikijin);
  fillSelect(selSi, rikijin, kagesin);
  render(rikijin, kagesin);
});

buildQuiz();

// ═══════════════════════════════════════════════════
// 初回描画
// ═══════════════════════════════════════════════════
render('seiryu','byakko');
</script>
</body>
</html>
